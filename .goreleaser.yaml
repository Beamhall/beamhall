# GoReleaser config for Beamhall (https://goreleaser.com).
# Reproducible release of the appliance binary + the lab dev IdP, with
# checksums and the systemd packaging bundled into the archive.
#
#   goreleaser build --snapshot --clean      # local binaries, no publish
#   goreleaser release --snapshot --clean     # local archives + checksums
#   goreleaser release --clean                # tagged release (needs a git tag)
version: 2

project_name: beamhall

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: beamhalld
    main: ./cmd/beamhalld
    binary: beamhalld
    env: [CGO_ENABLED=0] # modernc.org/sqlite is pure-Go: fully static, cross-compiles clean
    goos: [linux]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}" # reproducible builds

  - id: bh-devidp
    main: ./cmd/bh-devidp
    binary: bh-devidp
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: [-s -w]
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: beamhall
    ids: [beamhalld, bh-devidp]
    name_template: "beamhall_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README.md
      - docs/threat-model.md
      - packaging/beamhalld.service
      - packaging/beamhalld.env.example
      - packaging/install.sh
      - packaging/README.md
      - packaging/keycloak/setup-bundled-idp.sh
      - packaging/keycloak/realm-template.json
      - packaging/keycloak/beamhall-keycloak.service
      - packaging/keycloak/README.md
      - scripts/lab-bootstrap.sh
      - scripts/mail-broker-setup.sh
      - scripts/preflight.sh

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-dev-{{ .ShortCommit }}"

changelog:
  use: git
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^chore:"]

release:
  # Publish on tag so `install.sh` can resolve the latest release and fetch the
  # arch binary unauthenticated. Pre-1.0 tags (e.g. v0.x via -rc) mark prerelease.
  draft: false
  prerelease: auto
  make_latest: true
  # Attach the bootstrap scripts as standalone, version-independent assets so the
  # docs can fetch them from the stable URL
  # https://github.com/Beamhall/beamhall/releases/latest/download/<name> — always
  # the latest RELEASE (not the dev branch), with no per-version doc edits.
  extra_files:
    - glob: packaging/install.sh
    - glob: packaging/keycloak/setup-bundled-idp.sh
    - glob: packaging/keycloak/realm-template.json
    - glob: packaging/keycloak/beamhall-keycloak.service
    - glob: scripts/mail-broker-setup.sh
