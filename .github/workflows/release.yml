name: Release

# Tag-triggered release: GoReleaser builds the static beamhalld/bh-devidp
# binaries (linux amd64/arm64), bundles the systemd packaging + install.sh,
# writes checksums, and publishes a GitHub Release. install.sh fetches the
# published binary by arch and verifies it against checksums.txt.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release + upload assets

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for the changelog
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
